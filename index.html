<!DOCTYPE html>

<head>

    <title>BRASA Energy Drink</title>

    <link rel="stylesheet" href="style.css">

</head>

    <!-- Cabeçalho -->

        <button class="menu" aria-label="Abrir menu">

        </button>


        <h1 class="logo">
            BRASA

    </header>



    <!-- Tela principal -->
    <main class="hero">


        <section class="texto">

                Da força da onça.
                Da liberdade da arara.

            </p>


        </section>



        <!-- Imagem da lata -->
        <section class="lata">


            <!-- Cole seu link direto do Postimages -->
            <img
                src="https://i.postimg.cc/7ZM2KCDc/IMG-4665.png"

                id="lata">

            ↓ DESCUBRA A ENERGIA
